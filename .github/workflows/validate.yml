name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate skill scaffold
        run: npm run skill:validate

      - name: Run baseline evals
        run: npm run evals:run

      - name: Score report artifacts
        run: npm run evals:artifacts

      - name: Score captured reports
        run: npm run evals:captures
